<div style="background:var(--surface-page)" data-screen-label="Menu">

  <x-import component-from-global-scope="JimmySTapasBarDesignSystem_b07675.NavBar" logo="{{ logoUrl }}" links="{{ navLinks }}" cta-label="Reservieren" cta-href="Contact.html#reservieren" transparent="{{ navTransparent }}" hint-size="100%,84px"></x-import>

  <!-- HEADER -->
  <section style="background:var(--ink-900);padding:calc(84px + var(--space-8)) var(--container-pad) var(--space-8);text-align:center;border-bottom:1px solid var(--border-on-dark)">
    <x-import component-from-global-scope="JimmySTapasBarDesignSystem_b07675.Divider" tone="gold" width="80" hint-size="80px,16px"></x-import>
    <div style="margin-top:var(--space-5)">

    </div>
  </section>

  <!-- KATEGORIE-FILTER -->
  <section style="background:var(--surface-page);padding:var(--space-7) var(--container-pad) 0">
    <div style="max-width:var(--container-max);margin:0 auto;display:flex;justify-content:center;gap:var(--space-3);flex-wrap:wrap">
      <sc-for list="{{ categories }}" as="cat">
        <button onclick="{{ cat.select }}" style="font:var(--text-button);letter-spacing:var(--tracking-wider);text-transform:uppercase;padding:0.85em 1.6em;border-radius:var(--radius-pill);border:1px solid {{ cat.borderColor }};background:{{ cat.bg }};color:{{ cat.color }};cursor:pointer;transition:all var(--duration-fast) var(--ease-standard)">{{ cat.label }}</button>
      </sc-for>
    </div>
  </section>

  <!-- GERICHTE -->
  <section style="background:var(--surface-page);padding:var(--space-8) var(--container-pad) var(--section-pad-y)">
    <div style="max-width:var(--container-max);margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:var(--space-5)">
      <sc-for list="{{ dishes }}" as="dish">
        <div style="display:flex;flex-direction:column;gap:var(--space-3);background:var(--surface-card);border:1px solid var(--border-on-dark);border-radius:var(--radius-lg);padding:var(--space-5)">
          <div style="display:flex;justify-content:space-between;gap:var(--space-3);align-items:flex-start">
            <h3 style="font:var(--text-serif-lg);color:var(--text-on-dark-primary);margin:0">{{ dish.name }}</h3>
            <span style="font:var(--text-serif-md);color:var(--gold-400);white-space:nowrap;flex-shrink:0">{{ dish.price }}</span>
          </div>
          <sc-if value="{{ dish.description }}">
            <p style="font:var(--text-body-sm);color:var(--text-on-dark-secondary);margin:0">{{ dish.description }}</p>
          </sc-if>
          <sc-if value="{{ dish.badges.length }}">
            <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;margin-top:auto;padding-top:var(--space-2)">
              <sc-for list="{{ dish.badges }}" as="b">
                <x-import component-from-global-scope="JimmySTapasBarDesignSystem_b07675.Badge" tone="{{ b.tone }}">{{ b.label }}</x-import>
              </sc-for>
            </div>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </section>

  <!-- RESERVIERUNGS-CTA -->
  <section style="background:var(--ink-900);padding:var(--space-10) var(--container-pad);text-align:center;border-top:1px solid var(--border-on-dark)">
    <x-import component-from-global-scope="JimmySTapasBarDesignSystem_b07675.Divider" tone="gold" width="80" hint-size="80px,16px"></x-import>
    <h2 style="font:var(--text-display-md);color:var(--cream-100);margin:var(--space-5) 0 0">Lust bekommen?</h2>
    <div style="font:var(--text-script-md);color:var(--gold-400);margin-top:var(--space-2);white-space:nowrap">wir freuen uns auf Dich</div>
    <div style="margin-top:var(--space-6)">

    </div>
  </section>

  <x-import component-from-global-scope="JimmySTapasBarDesignSystem_b07675.Footer" logo="{{ logoUrl }}" address="Am Strande 21
23730 Neustadt in Holstein
+49 1573 5256793" hours="{{ hours }}" socials="{{ socials }}" legal-links="{{ legalLinks }}" hint-size="100%,320px"></x-import>

class Component extends DCLogic {
  state = { scrolled: false, active: 'Salate' };

  componentDidMount() {
    this.onScroll = () => {
      const s = window.scrollY > 80;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this.onScroll);
  }

  componentWillUnmount() {
    window.removeEventListener('scroll', this.onScroll);
  }

  renderVals() {
    const active = this.state.active;
    const current = MENU.find(m => m.cat === active) || MENU[0];
    return {
      logoUrl: 'images/jimmys-logo.png',
      navTransparent: !this.state.scrolled,
      navLinks: [
        { label: 'Speisekarte', href: 'Menu.html' },
        { label: 'Über uns', href: 'About.html' },
        { label: 'Kontakt', href: 'Contact.html' },
      ],
      categories: MENU.map(m => ({
        label: m.cat,
        select: () => this.setState({ active: m.cat }),
        bg: m.cat === active ? 'var(--gold-500)' : 'transparent',
        borderColor: m.cat === active ? 'var(--gold-500)' : 'var(--border-on-dark)',
        color: m.cat === active ? 'var(--action-primary-text)' : 'var(--text-on-dark-secondary)',
      })),
      dishes: current.items.map(([name, price, description, badges]) => ({
        name, price, description, badges: badges || [],
      })),
      hours: [
        { days: 'Täglich', time: '12 – 00 Uhr' },
      ],
      socials: [
        { label: 'Instagram', href: 'https://www.instagram.com/jimmys_tapass_bar/', icon: 'instagram' },
        { label: 'Facebook', href: 'https://www.facebook.com/p/Jimmys-Tapas-Bar-100066451364288/?locale=de_DE', icon: 'facebook' },
      ],
      legalLinks: [
        { label: 'Datenschutz', href: 'Datenschutz.html' },
        { label: 'Impressum', href: 'Impressum.html' },
      ],
    };
